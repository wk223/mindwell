# ==============================================
#  MindWell — SSL 证书自动续期
#  仅在 DNS 解析已生效后使用
#
#  启动: docker compose -f docker-compose.ssl.yml up -d
# ==============================================
name: mindwell-ssl

services:
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet
          sleep 12h
        done
