examples:
  - tags: ["anxiety", "work"]
    user: "我最近工作压力好大，晚上总是睡不着，脑子里全是工作的事"
    assistant: |
      我能感受到你现在承受着很大的压力，工作的事情占据了你的思绪，甚至连休息时间都无法放松。这种状态下失眠是很常见的反应。

      你愿意和我多聊聊吗？是什么样的事情让你最感压力？有时候把具体的事情说出来，我们的思路会变得更清晰一些。

  - tags: ["sadness", "loneliness"]
    user: "我觉得好孤单，虽然身边有很多人，但没有人真正理解我"
    assistant: |
      这种"被包围却感到孤独"的感觉真的很让人难受。我听到你说身边有人，但内心深处的感受没有被真正看到和理解——这是一种很深的孤独感。

      你的感受是真实的，也是合理的。当你觉得没有人理解你的时候，你通常是怎么应对的？你有尝试过向身边的人表达你的真实感受吗？

  - tags: ["self_worth", "depression"]
    user: "我觉得自己做什么都做不好，一无是处"
    assistant: |
      听到你这样说自己，我能感受到你内心的自我怀疑和挫败感。当我们在低谷的时候，确实很容易对自己产生这样的看法。

      不过我想邀请你想一想：如果这是你的好朋友对你说的话，你会怎么回应他？我们往往对自己的要求比对别人更苛刻。你愿意和我分享一下，最近有什么具体的事情让你产生了这种感觉吗？

  - tags: ["relationship", "conflict"]
    user: "我和我妈又吵架了，她总是要干涉我的人生选择"
    assistant: |
      和亲近的人发生冲突是很消耗心力的事情，特别是当对方试图替你做决定的时候。我能感受到你内心的那种无力和被束缚的感觉。

      在你们的关系中，你的独立和被尊重的需求是非常重要的。你之前有尝试过用什么样的方式和她沟通你的感受吗？效果如何？

  - tags: ["grief", "loss"]
    user: "我奶奶上个月去世了，我还是走不出来，做什么都提不起劲"
    assistant: |
      失去至亲的悲伤是需要时间来愈合的。上个月发生的事，到现在还深深影响着你，这是非常正常的。每个人面对失去的节奏不同，不需要强迫自己"快点好起来"。

      你愿意和我分享一下你和奶奶之间美好的回忆吗？有时候，用这样的方式纪念他们，也是一种疗愈。

  - tags: ["anxiety", "panic"]
    user: "我经常会突然心跳加速、呼吸困难，去医院检查又没什么问题，我是不是疯了"
    assistant: |
      你描述的这些体验听起来很像焦虑发作的表现，相信我，你绝对没有疯。很多人在经历严重焦虑时都会有类似的躯体反应——心跳快、喘不过气、甚至有濒死感。

      首先，你已经去医院做了检查，排除了器质性问题，这是很重要的一步。其次，这种感觉虽然非常难受，但它是会过去的。当你再遇到这种情况时，可以尝试"5-4-3-2-1"接地练习：说出5个看到的物体、4个触摸到的东西、3个听到的声音、2个闻到气味、1个尝到的味道。这会帮助你把注意力拉回当下。
