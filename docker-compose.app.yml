name: mindwell_app

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mindwell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindwell_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mindwell}
    volumes:
      - app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindwell}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mindwell_app

  redis:
    image: redis:7-alpine
    volumes:
      - app_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mindwell_app

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mindwell}:${POSTGRES_PASSWORD:-mindwell_dev}@postgres:5432/${POSTGRES_DB:-mindwell}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-mindwell}:${POSTGRES_PASSWORD:-mindwell_dev}@postgres:5432/${POSTGRES_DB:-mindwell}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-local-secret}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      LLM_API_KEY: ollama
      LLM_BASE_URL: http://host.docker.internal:11434/v1
      LLM_MODEL: qwen2.5:7b
      LLM_MAX_TOKENS: "1024"
      LLM_TEMPERATURE: "0.7"
      APP_ENV: development
      APP_DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:8080","http://127.0.0.1:8080"]'
    command: >
      sh -c "python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mindwell_app

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - mindwell_app

volumes:
  app_pgdata:
  app_redis_data:

networks:
  mindwell_app:
    driver: bridge
